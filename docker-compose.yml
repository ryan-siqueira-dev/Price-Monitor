services:
  api:
    build: .
    env_file: .env
    environment:
      PRICE_MONITOR_DATABASE_URL: sqlite:////app/data/price_monitor.db
      PRICE_MONITOR_USE_BROWSER: "true"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  scheduler:
    build: .
    command: ["python", "-m", "price_monitor.cli", "daemon", "--interval-hours", "24"]
    env_file: .env
    environment:
      PRICE_MONITOR_DATABASE_URL: sqlite:////app/data/price_monitor.db
      PRICE_MONITOR_USE_BROWSER: "true"
    volumes:
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
